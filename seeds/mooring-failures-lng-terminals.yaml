    title: "API RP 2SK 4th Edition (2024) — stationkeeping design, dynamic amplification"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      API RP 2SK, 4th Edition (February 2024) — Design and Analysis of Stationkeeping Systems
      for Floating Structures. Critical finding: mean wave drift forces and low-frequency vessel
      motions increase with decreasing wave period, meaning the N-year return period wave
      condition may not yield the most onerous mooring responses. Requires good estimates of
      low-frequency damping. Mooring line damping (mainly from drag force on line) can dominate
      total damping of catenary moored systems. Realistic motion damping estimates are crucial
      for predicting slowly varying resonant vessel motions. 4th edition updates: design limit
      states aligned with ISO 19900, new normative guidelines for mooring design Robustness
      Check, and Response Based Analysis methods.
    patterns:
      - "N-year return period wave may NOT be the most onerous mooring case — check shorter periods"
      - "Mooring line damping from drag can dominate total system damping for catenary systems"
