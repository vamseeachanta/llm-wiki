        added_at: "2026-03-29"

  - id: MOORING-summit-fsru-bangladesh-2021
    type: career
    category: mooring-failures
    subcategory: incident
    title: "Summit FSRU Bangladesh (2021) — mooring line tear, 3 months out of service"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      The Summit FSRU at Moheshkhali, Cox's Bazar, Bangladesh suffered a mooring line tear in
      the last week of November 2021. Unable to conduct ship-to-ship LNG transfers until a new
      mooring line was installed. This halved Bangladesh's LNG regasification capacity (~500,000
      Mcf/d) and repair was not completed until mid-January 2022 — three months out of service,
      causing gas shortages for power plants, industries, and households. Separately during
      Cyclone Remal (May 2024), a floating pontoon broke loose and struck the Summit LNG
      Terminal at Moheshkhali, causing significant damage.
    patterns:
      - "Single mooring line failure can halt entire FSRU operations for months"
      - "FSRU mooring failure has national energy security consequences for import-dependent countries"
      - "Cyclone damage to mooring infrastructure compounds existing vulnerability"
