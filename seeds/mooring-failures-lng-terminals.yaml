  - id: MOORING-nws-paper-vandermolen-2003
    type: career
    category: mooring-failures
    subcategory: technical-paper
    title: "Van der Molen & Ligteringen (2003) — Behavior of a Moored LNG Ship in Swell Waves"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      "Behavior of a Moored LNG Ship in Swell Waves" by van der Molen & Ligteringen (2003),
      published in Journal of Waterway, Port, Coastal and Ocean Engineering. Based on prototype
      measurements at the Withnell Bay LNG jetty. Found that yaw motions are dominant for
      maximum line forces in breast lines for a 125,000m3 LNG carrier moored to a jetty
      exposed to swell. Showed 10-20% underestimation in calculated maximum forces compared
      to prototype measurements.
    patterns:
      - "Yaw motions dominate maximum breast line forces for LNG carriers at swell-exposed jetties"
      - "Calculated maximum mooring forces underestimate prototype measurements by 10-20%"
