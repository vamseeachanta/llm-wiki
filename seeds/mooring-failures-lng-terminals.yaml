  - id: MOORING-peru-lng-shoretension
    type: career
    category: mooring-failures
    subcategory: mitigation
    title: "Peru LNG Terminal — ShoreTension VST system, 20% berth availability increase"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      Peru LNG Terminal is protected by a detached breakwater against incident swells but
      remained open to infragravity waves, causing vessel surge and only 68% berth availability.
      In 2022, six Vertical ShoreTension (VST) units installed (4 on mooring dolphins, 2 on
      breasting dolphins). Result: vessels loaded in approximately 20% larger swell conditions,
      with reduced surge motions and mooring line forces. Berth availability increased by ~20%.
    patterns:
      - "Detached breakwater blocks direct swell but not infragravity waves"
      - "VST units increased berth availability from 68% to ~88%"
      - "Infrastructure solution at mooring dolphins — no vessel modification needed"
