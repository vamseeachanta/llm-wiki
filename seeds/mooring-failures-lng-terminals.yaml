  # ═══════════════════════════════════════════════════════════════
  # PHYSICS — LONG-PERIOD SWELL AND RESONANCE
  # ═══════════════════════════════════════════════════════════════

  - id: MOORING-physics-long-period-resonance
    type: career
    category: mooring-failures
    subcategory: physics
    title: "Long-period swell mooring resonance — why 50mm waves can part mooring lines"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      The mechanism by which very small long-period swells cause mooring line failure:
      (1) Long-period ocean swells (T > 15-20s) propagate from remote storms thousands of km
      away; (2) In shallow water, bound waves and second-order difference frequency forces
      increase dramatically with increasing wave period; (3) These low-frequency forces excite
      the natural resonance frequencies of the vessel-mooring system (surge ~100-200s, sway
      ~50-150s, yaw ~50-100s); (4) Resonance amplification factors of 10-50x are possible,
      meaning a 50mm wave can generate vessel motions equivalent to a 0.5-2.5m wave at
      the resonant frequency; (5) The amplified motions impose extreme cyclic loads on
      mooring lines, particularly aft breast lines; (6) Lines fail at 10-60% of MBL due to
      fatigue accumulation or pre-existing degradation. Infragravity waves (periods 25-250s)
      formed through subharmonic interactions of sea and swell components can also cause
      harbour seiching that further amplifies resonance.
    patterns:
      - "Resonance amplification of 10-50x means 50mm swell can act like 0.5-2.5m at resonant frequency"
      - "Natural periods: surge ~100-200s, sway ~50-150s, yaw ~50-100s for moored LNG carriers"
      - "Aft breast lines are most vulnerable due to yaw motion dominance"
      - "Infragravity waves (25-250s period) cause harbour seiching that amplifies resonance"
      - "Remote storms in S Indian Ocean, off southern Africa, and Great Australian Bight generate NW Australia swell"
    follow_ons:
      - type: reference
        title: "UWA — Nowcasting infragravity wave height within a harbour"
        url: "https://research-repository.uwa.edu.au/en/publications/nowcasting-infragravity-wave-height-within-a-harbour-using-an-art"
        added_at: "2026-03-29"
      - type: reference
        title: "Review of Long Wave Dynamics over Reefs and into Ports"
        url: "https://www.mdpi.com/2077-1312/4/1/12"
        added_at: "2026-03-29"

