  - id: MOORING-geraldton-australia
    type: career
    category: mooring-failures
    subcategory: terminal-investigation
    title: "Port of Geraldton, WA — long-period wave mooring failures and solutions"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      Geraldton Harbour experiences frequent mooring line breakages from long-period waves
      generated as swell propagates over wide shallow reef to the north/northwest. Long waves
      refract on reef outskirts and channel side slopes, diffracting around the western
      breakwater into port. Solutions investigated: breakwater extension (effective but cost-
      prohibitive), pneumatic fenders + constant tension winches (50% increase in threshold
      long wave height), nylon breast lines on brake winch, MoorMaster at Berth 7, ShoreTension
      units (30-81% reduction in horizontal motions, average 61%). Critical finding: increasing
      spring lines without maintaining sufficient pre-tension can WORSEN surge motions by
      aligning natural resonance mode with infragravity wave frequency. ShoreTension deployed
      for cruise ship berthing after estimated $6.2M lost from 18 cancelled visits over 4 years.
    patterns:
      - "More spring lines without pre-tension can WORSEN surge by tuning resonance to infragravity frequency"
      - "ShoreTension units: 30-81% horizontal motion reduction (avg 61%)"
      - "Breakwater extension effective but cost-prohibitive at reef fringe"
      - "Combined approach needed: structural + operational + monitoring"
    follow_ons:
      - type: reference
        title: "Geraldton mooring improvements (MDPI)"
        url: "https://www.mdpi.com/2077-1312/4/1/3"
        added_at: "2026-03-29"
