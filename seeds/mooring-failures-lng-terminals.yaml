  - id: MOORING-golar-freeze-elba-island-2006
    type: career
    category: mooring-failures
    subcategory: incident
    title: "Golar Freeze at Elba Island/Southern LNG (2006) — passing vessel wake breakaway"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      While the LNG tanker Golar Freeze was discharging at Southern LNG terminal on Elba Island
      in the Savannah River, Georgia, a river pilot passed the terminal at approximately 14 knots.
      The passing vessel's wake knocked the Golar Freeze loose of some moorings, causing mooring
      lines and the fuel hose to break, resulting in fire/explosion risk. The tanker pulled away
      from the pier. Dock shut down for ~36 hours for USCG and FERC investigation. Southern LNG
      subsequently spent $35 million to carve out a slip for two LNG carriers to get them off the
      main river channel. Coast Guard mandated that passing ships be escorted at slow speed by
      tugs whenever an LNG tanker was moored.
    patterns:
      - "Passing vessel wake at 14 knots sufficient to break LNG carrier moorings in river berth"
      - "$35M remediation: carved dedicated slip to remove LNG berth from main river channel"
      - "USCG mandated slow-speed escorted passing when LNG tanker moored"
    follow_ons:
      - type: reference
        title: "Federal Register — Security Zone, Elba Island LNG mooring slip"
