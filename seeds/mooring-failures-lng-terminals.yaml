    type: career
    category: mooring-failures
    subcategory: technical-paper
    title: "Grant & Holboke (2004) OTC 16718 — Shallow Water Effects on Low-Frequency Wave Excitation"
    learned_at: "2026-03-29T00:00:00Z"
