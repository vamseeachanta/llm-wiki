  - id: MOORING-nws-lng-2014-incident
    type: career
    category: mooring-failures
    subcategory: incident
    title: "NWS LNG 2014 — 3 mooring lines parted in ~50mm long-period swell"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      In 2014, three mooring lines parted at one of the Withnell Bay LNG berths during a
      long-period swell event with wave heights of approximately 50mm. The seemingly benign
      conditions masked the real mechanism: even very small long-period swells excite resonant
      surge, sway, and yaw motions at the natural frequency of the vessel-mooring system,
      amplifying forces far beyond what the wave height alone would suggest. This is the core
      physics of infragravity wave / long-period swell interaction with moored vessels.
      Second-order difference frequency forces on an LNG carrier increase dramatically with
      increasing wave period in shallow water, creating large low-frequency motions that
      impose extreme loads on mooring lines. Woodside launched an extensive forensic
      investigation using specialist consultants. The Aktis Hydraulics forensic investigation
      of "three independent events" of mooring line failure at an LNG terminal due to long
      swell diffracting around a detached breakwater is strongly consistent with this event.
    patterns:
      - "50mm swell height can generate catastrophic mooring loads through resonance amplification"
      - "Second-order difference frequency forces increase dramatically with wave period in shallow water"
      - "Infragravity waves (periods 25-250s) cause harbour seiching and resonance amplification"
      - "Yaw motions are dominant for maximum line forces in breast lines for 125,000m3 LNG carrier at jetty"
      - "Bound waves and low-frequency drift forces are the key physics, not the direct wave force"
    follow_ons:
      - type: reference
        title: "Aktis Hydraulics — Forensic investigation into LNG mooring line failure"
        url: "https://aktishydraulics.com/portfolio-item/lng_failure_pacific/"
        added_at: "2026-03-29"

