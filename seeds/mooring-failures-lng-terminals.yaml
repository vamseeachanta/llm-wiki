  - id: MOORING-jip-hawaiii
    type: career
    category: mooring-failures
    subcategory: research
    title: "JIP HAWAIII (Deltares/MARIN) — LNG mooring in shallow/intermediate water"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      JIP HawaIII (sHAllow WAter InItIative) is a multi-phase joint industry project by
      Deltares and MARIN focused on mooring of LNG vessels in intermediate water depths
      (15-40m). Addresses infragravity waves generated by wave component interactions in
      shallow water (periods around 1 minute), to which moored LNG vessels are specifically
      sensitive, leading to resonant behavior with excessive motions and mooring line forces.
      Develops full design methodologies, performs scale model tests, and validates against
      numerical results. Streamlined LNG carrier hulls have very low damping against
      low-frequency surge motions, making them particularly vulnerable.
    patterns:
      - "LNG carriers uniquely vulnerable: streamlined hulls have very low surge damping"
      - "Infragravity waves in 15-40m water depth drive resonant mooring behavior"
      - "Scale model tests + numerical validation for design methodology"
