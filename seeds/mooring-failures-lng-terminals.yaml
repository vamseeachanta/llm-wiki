  - id: MOORING-zarga-milford-haven-2015
    type: career
    category: mooring-failures
    subcategory: incident
    title: "LNG Zarga at South Hook, Milford Haven (2015) — HMPE line failure, severe crew injury"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      On 2 March 2015, at South Hook LNG Terminal, Milford Haven, Wales, a deck officer on
      the LNG carrier Zarga suffered severe head injuries when struck by a parted HMPE mooring
      rope during berthing. The MAIB investigation found the rope was not fit for purpose — it
      did not have the MBL specified at build. The predominant failure mode was axial compression
      fatigue (ACF), previously unassociated with HMPE rope failures. The rope's tightly bound
      jacketed construction increased the likelihood of ACF. Crew perception was that HMPE ropes
      did not recoil on failure — this was incorrect.
    patterns:
      - "Axial compression fatigue (ACF) is a failure mode for jacketed HMPE mooring ropes"
      - "Jacketed HMPE construction increases ACF likelihood vs non-jacketed"
      - "HMPE ropes DO recoil on failure — crew perception of no snap-back is dangerously wrong"
      - "MBL at delivery must be verified against specification — manufacturing QC gap caused this failure"
    follow_ons:
      - type: reference
        title: "MAIB Report — Zarga mooring line failure"
        url: "https://www.gov.uk/maib-reports/failure-of-mooring-line-on-board-lng-carrier-zarga-with-1-person-injured"
        added_at: "2026-03-29"
      - type: reference
        title: "MAIB Zarga Combined Annexes"
        url: "https://assets.publishing.service.gov.uk/media/59400155ed915d20f8000229/Zarga_CombinedAnnexes.pdf"
        added_at: "2026-03-29"

  - id: MOORING-hmpe-industry-failures-2007-2011
    type: career
    category: mooring-failures
    subcategory: industry-investigation
    title: "HMPE mooring line failures industry-wide (2007-2011) — TTI/DSM Dyneema Users Group"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      During 2007-2011, approximately 3% of HMPE ropes in LNG service failed. Aft breast lines
      failed 2x as often as other line positions. Tensions at failure were only 10-60% of MBL,
      indicating premature degradation. Q-flex (216,000m3) and Q-max (266,000m3) carriers had a
      disproportionate share of failures despite using more and larger lines (18-20 lines of 44mm
      vs 16-18 of 42mm for conventional carriers). Three ports stood out for disproportionate
      failures, one exposed to high swell/wave/current/wind loads. The 2011 Users Group
      (coordinated by TTI/UK with DSM Dyneema) ruled out bending fatigue, tension fatigue,
      creep rupture, hysteresis heating, chemical degradation, oxidation, and UV degradation.
      Root causes identified: low HMPE content (to reduce cost), increased lay lengths creating
      distortion, and axial compression fatigue.
    patterns:
      - "~3% HMPE rope failure rate in LNG service 2007-2011; aft breast lines fail 2x as often"
      - "Failure tensions at 10-60% of MBL indicate premature rope degradation, not overload"
      - "Q-flex/Q-max carriers had disproportionate failures despite more/larger lines"
      - "Root causes: low HMPE content, increased lay lengths, axial compression fatigue"
      - "Ruled out: bending fatigue, tension fatigue, creep, hysteresis, chemical degradation, UV"
    follow_ons:
      - type: reference
        title: "Riviera — Solutions to LNG carrier mooring line failures identified"
        url: "https://www.rivieramm.com/news-content-hub/news-content-hub/solutions-to-lng-carrier-mooring-line-failures-identified-41027"
        added_at: "2026-03-29"
      - type: reference
        title: "Riviera — Maintenance factor in LNG mooring"
        url: "https://www.rivieramm.com/news-content-hub/news-content-hub/maintenance-factor-looms-large-in-the-lng-mooring-system-equation-38229"
        added_at: "2026-03-29"
      - type: reference
        title: "gCaptain — Switching from jacketed HMPE to non-jacketed Dyneema SK78"
        url: "https://gcaptain.com/enough-enough-switching-failure-prone-jacketed-hmpe-ropes-non-jacketed-ropes-dyneema-sk78/"
        added_at: "2026-03-29"

  - id: MOORING-prelude-flng-2018
    type: career
    category: mooring-failures
    subcategory: incident
    title: "Prelude FLNG — LNG carrier Gallina nylon line failure (2018, NOPSEMA Incident 5415)"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      On 19 May 2018, LNG carrier Gallina was moored with 16 mooring lines at Prelude FLNG.
      At 19:40, mooring line 3 was found to have parted; further checks found all 16 lines had
      been significantly damaged. Root cause was incompatibility of nylon rope with nylon liner
      on the FLNG fairlead — small radius pressure points between rope and liner generated
      excessive heat and abrasion when the nylon lines stretched under tension. NOPSEMA stated
      there could have been a "complete mooring failure" with "potential for serious consequences"
      if it had occurred during LNG transfer. Separately in 2019, before the first cargo was ever
      loaded, the facility was shut down after steel mooring lines were wearing faster than
      expected. All 16 mooring lines had to be replaced. NOPSEMA ordered a delay to startup
      until June 2019.
    patterns:
      - "Heat and abrasion can cause nylon mooring line failure at FLNG side-by-side operations"
      - "Nylon rope on nylon fairlead liner creates incompatible friction/heat buildup"
      - "All 16 lines damaged in single event — systemic design failure, not individual line defect"
      - "Steel mooring lines also wore faster than expected at Prelude — replaced before first cargo"
    follow_ons:
      - type: reference
        title: "NOPSEMA Incident 5415 — Prelude FLNG"
        url: "https://www.nopsema.gov.au/sites/default/files/documents/2021-04/RMS-extract-Prelude-FLNG-Incident-notification-5415.pdf"
        added_at: "2026-03-29"
      - type: reference
        title: "SPE JPT — The Many Growing Pains of Shell's Prelude FLNG Continue"
        url: "https://jpt.spe.org/the-many-growing-pains-of-shells-prelude-flng-continue"
        added_at: "2026-03-29"

  - id: MOORING-ras-laffan-qatar
    type: career
    category: mooring-failures
    subcategory: incident
    title: "Ras Laffan LNG (Qatar) — likely one of three ports with disproportionate HMPE failures"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      Ras Laffan has six LNG berths, four capable of receiving Q-Max vessels (266,000m3). Each
      berth has 12 sets of mooring hooks (125 tonne SWL). The Q-flex and Q-max vessels were
      disproportionately involved in HMPE failures during 2007-2011. The Riviera/TTI analysis
      identified "three ports with elevated failure rates": two with high Q-flex/Q-max traffic
      (Ras Laffan and South Hook/Milford Haven are the obvious candidates), and one exposed to
      elevated environmental loads (likely Withnell Bay/NW Shelf). No specific named incident
      report found publicly, but circumstantial evidence (primary Q-max origin port,
      disproportionate Q-flex/Q-max HMPE failures, SIGTTO/OCIMF involvement) strongly places
      Ras Laffan as one of the three ports.
    patterns:
      - "Primary Q-max origin port with high-frequency LNG loading operations"
      - "12 sets of 125t SWL mooring hooks per berth for Q-max vessels"
    follow_ons: []

  - id: MOORING-bw-fleet-spain-seven-lines
    type: career
    category: mooring-failures
    subcategory: incident
    title: "BW Fleet Management — 7 HMPE lines failed simultaneously in Spain"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      A BW Fleet Management LNG carrier lost seven HMPE mooring lines simultaneously during a
      single berthing operation in Spain. This was the worst in a series of ongoing failures.
      Root cause: jacketed HMPE rope construction hid internal core damage beneath the protective
      jacket, preventing inspection and allowing deterioration to progress undetected to
      catastrophic failure. BW FM subsequently replaced ALL jacketed HMPE mooring ropes
      fleet-wide with non-jacketed Samson AmSteel-Blue ropes made with Dyneema SK78. After
      two years of service (~1,500+ hours per vessel), they reported zero further incidents
      at any port worldwide.
    patterns:
      - "Jacketed HMPE hides internal core damage — prevents visual inspection of deterioration"
      - "7 simultaneous line failures = systemic rope degradation, not acute overload"
      - "Non-jacketed Dyneema SK78 (Samson AmSteel-Blue) eliminated failures fleet-wide"
      - "Fleet-wide rope replacement is the correct response to systemic jacketed HMPE failure"
    follow_ons:
      - type: reference
        title: "gCaptain — switching from jacketed HMPE to non-jacketed Dyneema SK78"
        url: "https://gcaptain.com/enough-enough-switching-failure-prone-jacketed-hmpe-ropes-non-jacketed-ropes-dyneema-sk78/"
        added_at: "2026-03-29"
