  - id: MOORING-aktis-forensic-investigation
    type: career
    category: mooring-failures
    subcategory: investigation
    title: "Aktis Hydraulics — Forensic investigation into three LNG mooring line failure events"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      Aktis Hydraulics conducted a forensic investigation into three independent events of
      historic mooring line failure at an LNG terminal where long swells diffracted around a
      detached breakwater and impacted mooring integrity. Used SWAN (wave hindcasting), SWASH
      (long wave propagation), and ANSYS-AQWA (hydrodynamic loads). SWASH signals were
      decomposed into phase-related systems diffracting around the breakwater heads. Fluid
      column velocities and wave directional amplitudes were assessed to describe the cross-sea
      behind the breakwater. The result was large resonance behaviour of the carrier at the
      terminal, eventually leading to lines failing. The description of "detached breakwater"
      and "three independent events" is strongly consistent with the NWS LNG incidents,
      though the Aktis page does not name the terminal.
    patterns:
      - "SWAN + SWASH + ANSYS-AQWA methodology for forensic wave-mooring failure investigation"
      - "Wave diffraction around breakwater heads creates cross-sea conditions behind breakwater"
      - "Reconstructing wave conditions at time of failure is essential for forensic mooring analysis"
    follow_ons:
      - type: reference
        title: "Aktis Hydraulics — LNG mooring line failure forensic investigation"
