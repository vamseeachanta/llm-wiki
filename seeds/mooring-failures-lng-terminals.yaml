    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      The SLAM (Swell-Local Adjustment via Monitoring) project, led by UWA's Jeff Hansen
      in collaboration with Woodside, aims to improve forecasting accuracy for long-period
      swell events affecting the NW Shelf LNG operations. Uses machine learning and data from
      floating wave buoys to provide better advance warning of mooring-critical swell conditions.
      Long-period swell at NW Australia originates from remote storm systems in the Southern
      Indian Ocean, off southern Africa, and the Great Australian Bight. Average 1.7 large
      tropical cyclones impact NWS per year.
    patterns:
