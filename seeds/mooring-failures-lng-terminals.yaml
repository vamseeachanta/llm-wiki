  - id: MOORING-nws-lng-overview
    type: career
    category: mooring-failures
    subcategory: terminal-investigation
    title: "NW Shelf LNG mooring failures — overview of multi-year investigation programme"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      The Karratha Gas Plant (KGP) at Withnell Bay, Mermaid Sound, operated by Woodside
      Energy on the North West Shelf of Australia, has three LNG loading jetties in open water.
      The facility has exported LNG since 1989, loading a vessel every 24-36 hours. Multiple
      mooring line break incidents occurred at NWS LNG since 2005. After another break in 2012,
      a significant investigation effort was launched. In 2014, Woodside launched a VERY deep
      investigation after 3 mooring lines parted in long-period swell of just ~50mm height —
      demonstrating that even extremely small long-period swells can excite resonant vessel
      motions and cause catastrophic mooring line failure. In 2015, Dom Allery (NW Shelf Port
      Operations Superintendent) presented the findings at a SIGTTO Panel meeting.
    patterns:
      - "Long-period swell (~20s period) at very low amplitude (~50mm) can part mooring lines via resonance"
      - "Mermaid Sound is protected from S Indian Ocean swell by islands to the west; swell enters from the north"
      - "Waves refract along the slopes of the navigation channel to the KGP terminal"
      - "After Pluto LNG channel was dredged, more westerly waves were observed that were not captured by the permanent wave buoy"
      - "Long-period swell events can make LNG loading impossible for a full week, forcing production ramp-backs"
