  - id: MOORING-asterix-busan-2023
    type: career
    category: mooring-failures
    subcategory: incident
    title: "MV Asterix at Busan (2023) — HMPE snap-back injury, TSB Canada M23F0012"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      Canadian naval auxiliary vessel Asterix (23,136 GT) experienced a mooring line failure on
      28 May 2023 at Busan Naval Base, Republic of Korea. A 30mm HMPE rope (Samson Quantum 12,
      Dyneema SK78/polyester blend, 53.5t MBL) parted at a pedestal roller. The bosun sustained
      serious chest, lung, and wrist injuries from the snap-back. Critically, crew believed HMPE
      ropes would not snap back — a dangerous misconception reinforced by manufacturer marketing
      claims. The automatic braking system also lacked a load-release mechanism. TSB Report
      M23F0012.
    patterns:
      - "HMPE ropes DO snap back on failure — manufacturer claims of 'no snap-back' are misleading"
      - "Pedestal rollers are a failure initiation point for HMPE ropes under tension"
      - "Automatic braking systems need load-release mechanisms to prevent overload"
    follow_ons:
