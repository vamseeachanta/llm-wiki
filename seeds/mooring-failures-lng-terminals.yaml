  - id: MOORING-ansac-splendor-longview-2018
    type: career
    category: mooring-failures
    subcategory: incident
    title: "Ansac Splendor at Longview (2018) — spring line snap-back, 2 fatalities"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      Bulk carrier Ansac Splendor (Panama-flagged, 581 ft) experienced a mooring line snap-back
      at Berth 5, Port of Longview, Washington, on 28 June 2018 at 01:45. A spring line parted
      at ~700 ft/sec (213 m/s). Two fatalities: longshoreman Byron Jacobs (34) and Chief Mate
      Pingshan Li (41). Two others injured. No pilot or tugs were involved during a vessel
      shifting operation. A $16M wrongful death lawsuit was filed. Not LNG-specific but
