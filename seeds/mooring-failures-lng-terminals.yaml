    type: career
    category: mooring-failures
    subcategory: technical-paper
    title: "Van der Molen, Garber et al. — Channel Wave Refraction Effect on Moored LNG Carriers"
    learned_at: "2026-03-29T00:00:00Z"
    source: mooring-failures-lng-terminals.yaml
    context: >
      "Channel Wave Refraction Effect on Moored LNG Carriers" by van der Molen, Garber et al.,
      presented at ICCE (International Conference on Coastal Engineering). Addresses the
      discovery that after the Pluto LNG Plant channel was dredged to the south-west of KGP,
      more westerly waves were observed by local pilots that were not consistently captured at
      the permanent wave buoy near the terminal. A single uni-directional swell spectrum close
      to the channel alignment was historically assumed for mooring assessments — this proved
      inadequate after the new channel changed wave propagation patterns.
